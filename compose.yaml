services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: itskdbb-api
    environment:
      API_PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: itskdbb-web
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
